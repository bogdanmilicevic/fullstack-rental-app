<div class="login-container">
  <div class="login-form">
    <h2>Administrator Prijava</h2>
    
    <div class="form-group">
      <label for="username">Korisničko ime:</label>
      <input type="text" id="username" [(ngModel)]="username" class="form-input" placeholder="Unesite korisničko ime">
    </div>
    
    <div class="form-group">
      <label for="password">Lozinka:</label>
      <input type="password" id="password" [(ngModel)]="password" class="form-input" placeholder="Unesite lozinku">
    </div>
    
    <button (click)="login()" class="btn btn-primary">Prijavi se kao Administrator</button>
    
    <p class="error" *ngIf="error">{{error}}</p>
  </div>
</div>
